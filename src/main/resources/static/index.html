<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能文件处理系统</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus 中文 -->
    <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.min.js"></script>
    <style>
        body { margin: 0; background: #f5f7fa; }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { color: #303133; margin: 0 0 10px; }
        .header p { color: #909399; margin: 0; }
        .upload-area { margin-bottom: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; text-align: center; padding: 20px; background: #fff; border-radius: 8px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #409eff; }
        .stat-card .label { color: #909399; margin-top: 5px; }
        .search-bar { margin-bottom: 20px; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>智能文件处理系统</h1>
            <p>文件上传 / 内容提取 / 全文搜索</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="number">{{ fileList.length }}</div>
                <div class="label">文件总数</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ completedCount }}</div>
                <div class="label">处理完成</div>
            </div>
            <div class="stat-card">
                <div class="number">{{ pendingCount }}</div>
                <div class="label">待处理</div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-area">
            <el-card>
                <template #header><span>上传文件</span></template>
                <el-upload
                        drag
                        action="/api/file/upload"
                        :on-success="handleUploadSuccess"
                        :on-error="handleUploadError"
                        :before-upload="beforeUpload"
                        multiple>
                    <el-icon style="font-size: 48px; color: #c0c4cc; margin-bottom: 10px;">&#x2195;</el-icon>
                    <div>拖拽文件到此处，或 <em>点击上传</em></div>
                    <template #tip>
                        <div style="color: #909399; font-size: 12px; margin-top: 8px;">
                            支持 PDF、Word、TXT、图片文件，单个文件不超过 50MB
                        </div>
                    </template>
                </el-upload>
            </el-card>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <el-card>
                <template #header><span>全文搜索</span></template>
                <el-input
                        v-model="keyword"
                        placeholder="输入关键词搜索文件内容..."
                        clearable
                        @keyup.enter="searchFiles"
                        style="margin-bottom: 15px;">
                    <template #append>
                        <el-button type="primary" @click="searchFiles">搜索</el-button>
                    </template>
                </el-input>
                <el-button v-if="isSearching" type="text" @click="loadFiles">清除搜索，显示全部</el-button>
            </el-card>
        </div>

        <!-- 文件列表 -->
        <el-card>
            <template #header><span>文件列表</span></template>
            <el-table :data="fileList" stripe style="width: 100%">
                <el-table-column label="ID" width="80">
                    <template #default="scope">
                        {{ scope.row.id }}
                    </template>
                </el-table-column>
                <el-table-column label="文件名" width="250" show-overflow-tooltip>
                    <template #default="scope">
                        {{ scope.row.fileName }}
                    </template>
                </el-table-column>
                <el-table-column label="类型" width="100">
                    <template #default="scope">
                        {{ scope.row.fileType }}
                    </template>
                </el-table-column>
                <el-table-column label="大小" width="100">
                    <template #default="scope">
                        {{ formatSize(scope.row.fileSize) }}
                    </template>
                </el-table-column>
                <el-table-column label="状态" width="100">
                    <template #default="scope">
                        <el-tag v-if="scope.row.status === 0" type="info">待处理</el-tag>
                        <el-tag v-else-if="scope.row.status === 1" type="warning">处理中</el-tag>
                        <el-tag v-else-if="scope.row.status === 2" type="success">已完成</el-tag>
                        <el-tag v-else-if="scope.row.status === 3" type="danger">失败</el-tag>
                    </template>
                </el-table-column>
                <el-table-column label="上传时间" width="170">
                    <template #default="scope">
                        {{ scope.row.createTime }}
                    </template>
                </el-table-column>
                <el-table-column label="操作" width="200">
                    <template #default="scope">
                        <el-button v-if="scope.row.ossUrl" type="primary" link @click="openFile(scope.row.ossUrl)">下载</el-button>
                        <el-button v-if="scope.row.status === 2" type="success" link @click="viewContent(scope.row)">查看内容</el-button>
                        <el-button type="primary" link @click="refreshFile(scope.row)">刷新状态</el-button>
                    </template>
                </el-table-column>
            </el-table>
        </el-card>
    </div>

    <!-- 内容查看弹窗 -->
    <el-dialog v-model="contentVisible" title="文件内容" width="60%">
        <el-input
                type="textarea"
                :rows="20"
                :value="currentContent"
                readonly />
    </el-dialog>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    const app = createApp({
        setup() {
            const fileList = ref([]);
            const keyword = ref('');
            const isSearching = ref(false);
            const contentVisible = ref(false);
            const currentContent = ref('');

            // 统计
            const completedCount = computed(() => fileList.value.filter(f => f.status === 2).length);
            const pendingCount = computed(() => fileList.value.filter(f => f.status === 0).length);

            // 加载文件列表
            const loadFiles = async () => {
                isSearching.value = false;
                const res = await fetch('/api/file/list');
                const data = await res.json();
                if (data.code === 200) {
                    fileList.value = data.data;
                }
            };

            // 搜索文件
            const searchFiles = async () => {
                if (!keyword.value) {
                    loadFiles();
                    return;
                }
                isSearching.value = true;
                const res = await fetch(`/api/search?keyword=${encodeURIComponent(keyword.value)}`);
                const data = await res.json();
                if (data.code === 200) {
                    fileList.value = data.data;
                }
            };

            // 上传成功
            const handleUploadSuccess = (response) => {
                if (response.code === 200) {
                    ElementPlus.ElMessage.success(response.message);
                    setTimeout(loadFiles, 3000);
                } else {
                    ElementPlus.ElMessage.error(response.message);
                }
            };

            // 上传失败
            const handleUploadError = () => {
                ElementPlus.ElMessage.error('上传失败，请重试');
            };

            // 上传前校验
            const beforeUpload = (file) => {
                const isLt50M = file.size / 1024 / 1024 < 50;
                if (!isLt50M) {
                    ElementPlus.ElMessage.error('文件大小不能超过 50MB');
                    return false;
                }
                return true;
            };

            // 打开文件
            const openFile = (url) => {
                window.open(url, '_blank');
            };

            // 查看内容
            const viewContent = (file) => {
                currentContent.value = file.content || '暂无内容';
                contentVisible.value = true;
            };

            // 刷新单个文件状态
            const refreshFile = async (file) => {
                const res = await fetch(`/api/file/${file.id}`);
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    Object.assign(file, data.data);
                    ElementPlus.ElMessage.success('状态已刷新');
                }
            };

            // 格式化文件大小
            const formatSize = (bytes) => {
                if (!bytes) return '-';
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            };

            // 页面加载时获取文件列表
            onMounted(loadFiles);

            return {
                fileList, keyword, isSearching,
                contentVisible, currentContent,
                completedCount, pendingCount,
                loadFiles, searchFiles,
                handleUploadSuccess, handleUploadError, beforeUpload,
                openFile, viewContent, refreshFile, formatSize
            };
        }
    });

    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn });
    app.mount('#app');
</script>
</body>
</html>
