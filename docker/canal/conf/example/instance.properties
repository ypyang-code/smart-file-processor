#################################################################
# Canal Server · Instance 配置文件
# Instance Name: example
# 适用版本: canal-server v1.1.7
# 创建时间: 2026-07-15
#
# 修改说明:
#   1. canal.instance.master.address → 宿主机 MySQL 地址
#   2. canal.instance.dbUsername / dbPassword → MySQL Canal 用户
#   3. canal.instance.filter.regex → 数据库.表 订阅过滤
#################################################################

# -------------------------------------------
# MySQL 连接信息
# -------------------------------------------
# ★ Windows Docker Desktop:
#   host.docker.internal 自动解析到宿主机 IP
#   如果宿主机 MySQL 监听 0.0.0.0:3306，容器可通过此地址访问
# ★ Linux Docker:
#   需要改为宿主机实际 IP，或使用 host 网络模式，或配置 extra_hosts
canal.instance.master.address = host.docker.internal:3306

# binlog 连接使用的用户名/密码
# 该用户需具备 SELECT, REPLICATION SLAVE, REPLICATION CLIENT 权限
# 详见 docs/canal-env-check.md §4
canal.instance.dbUsername = canal
canal.instance.dbPassword = canal

# 连接 MySQL 时使用的默认数据库（非强制，仅用于初始连接）
canal.instance.defaultDatabaseName = file_processor

# -------------------------------------------
# 数据库连接参数
# -------------------------------------------
canal.instance.connectionCharset = UTF-8
canal.instance.enableDruid = false

# -------------------------------------------
# binlog 订阅规则
# -------------------------------------------
# 格式: 数据库名\.表名 (Perl 正则)
#   .*\\..*         → 所有库所有表
#   file_processor\\..*      → file_processor 库所有表
#   file_processor\\.file_info → 仅 file_info 表
#
# 当前只订阅 file_processor.file_info（Phase 3 核心目标表）
# 后续 RAG 阶段增加 text_chunk 表时改为:
#   canal.instance.filter.regex = file_processor\\.file_info,file_processor\\.text_chunk
canal.instance.filter.regex = file_processor\\.file_info

# 过滤黑名单（不订阅的表），与 filter.regex 互补
canal.instance.filter.black.regex =

# -------------------------------------------
# binlog 位点管理
# -------------------------------------------
# tsdb 用于记录 binlog 消费位点，Canal Server 重启后可从此位点继续
canal.instance.tsdb.enable = true
canal.instance.tsdb.dir = ${canal.file.data.dir:../conf}/${canal.instance.destination:}
canal.instance.tsdb.url = jdbc:h2:${canal.instance.tsdb.dir}/h2;CACHE_SIZE=1000;MODE=MYSQL;
canal.instance.tsdb.dbUsername = canal
canal.instance.tsdb.dbPassword = canal

# -------------------------------------------
# 其他配置
# -------------------------------------------

# 是否在内存中缓冲 binlog 事件（开发环境关闭即可）
canal.instance.memory.buffer.mode = MEMSIZE
canal.instance.memory.buffer.size = 16384

# 心跳检测（秒）
canal.instance.detecting.enable = true
canal.instance.detecting.sql = select 1

# GTID 模式（MySQL 8.0 默认启用 GTID，设为 false 使用 binlog file + position）
canal.instance.gtidon = false
